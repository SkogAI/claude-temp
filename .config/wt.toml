# Worktrunk Project Configuration — claude/ meta-repo
# Hooks for worktree lifecycle. Checked into git.

# Verify .claude/ symlinks resolve after worktree creation
[post-create]
verify-symlinks = """
for link in .claude/skills .claude/commands .claude/hooks .claude/agents; do
  if [ -L "$link" ] && ! [ -e "$link" ]; then
    echo "BROKEN: $link -> $(readlink "$link")"
    exit 1
  fi
done
echo "symlinks ok"
"""

# Rename tmux window to branch name on switch
post-switch = "[ -n \"$TMUX\" ] && tmux rename-window {{ branch | sanitize }}"
